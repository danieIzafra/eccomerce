<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Gestão Premium</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style id="cortina-saas">body { opacity: 0 !important; visibility: hidden !important; }</style>
    
    <script>
        if (!window.__SaaS_Intercepted__) {
            window.__SaaS_Intercepted__ = true;
            (async function() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const slug = params.get('loja');
                    if (!slug) { document.getElementById('cortina-saas')?.remove(); return; }

                    const SUPABASE_URL = 'https://ikkjgtgvohrwurtiustm.supabase.co'; 
                    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlra2pndGd2b2hyd3VydGl1c3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzE4OTEsImV4cCI6MjA5MDE0Nzg5MX0.HNrSvCmSHWTe2yoQy27GOq5g_ZoZxFdox_eCW14f_nI';
                    const supaClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                    const { data } = await supaClient.from('lojas').select('codigo_customizado').eq('slug', slug).single();
                    if (data && data.codigo_customizado) {
                        const codigos = typeof data.codigo_customizado === 'string' ? JSON.parse(data.codigo_customizado) : data.codigo_customizado;
                        let paginaAtual = window.location.pathname.split('/').pop().replace('.html', '');
                        if (!paginaAtual || paginaAtual === '') paginaAtual = 'admin'; 
                        
                        if (codigos[paginaAtual] && codigos[paginaAtual].length > 50) {
                            let tagFechamento = '</' + 'style>';
                            let htmlLimpo = codigos[paginaAtual].replace(new RegExp('<style id="cortina-saas">[\\s\\S]*?' + tagFechamento, 'ig'), '');
                            document.open(); document.write(htmlLimpo); document.close();
                            return;
                        }
                    }
                    document.getElementById('cortina-saas')?.remove();
                } catch (err) { document.getElementById('cortina-saas')?.remove(); }
            })();
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #120b0e; 
            --text-color: #fcf5f7;
            --accent: #e8a5b1;
            --glass-bg: rgba(28, 17, 22, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-body); padding-bottom: 50px; }

        .admin-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--glass-border); margin-bottom: 30px; }
        .admin-header h1 { font-family: var(--font-heading); color: var(--accent); font-size: 2rem; }

        .admin-layout { display: grid; grid-template-columns: 260px 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .admin-menu { list-style: none; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; position: sticky; top: 20px; }
        .admin-menu li { margin-bottom: 10px; }
        .admin-menu button { width: 100%; text-align: left; padding: 14px; background: transparent; border: 1px solid transparent; color: var(--text-color); cursor: pointer; border-radius: 10px; transition: 0.3s; font-weight: 500; }
        .admin-menu button.active, .admin-menu button:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); color: var(--accent); }

        .admin-panel { display: none; animation: fadeIn 0.4s ease; }
        .admin-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .section-title { font-family: var(--font-heading); color: var(--accent); margin-bottom: 20px; font-size: 1.5rem; }

        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--glass-border); }
        .manage-item:last-child { border-bottom: none; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--accent); }

        .btn { padding: 12px 20px; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 8px; justify-content: center;}
        .btn-primary { background: var(--accent); color: #120b0e; }
        .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
        .btn-danger:hover { background: #ef4444; color: #fff; }

        .grid-horarios { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .horario-tag { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass-border); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .gallery-item { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-img { position: absolute; top: 5px; right: 5px; background: rgba(239, 68, 68, 0.8); border: none; color: white; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }

        .preview-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: 0 auto 15px; border: 2px solid var(--accent); display: none; }
        .placeholder-avatar { width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 2px dashed var(--glass-border); color: var(--accent); font-size: 3rem; }

        @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } .admin-menu { position: static; flex-direction: row; overflow-x: auto; display: flex; gap: 10px; } .admin-menu li { margin: 0; flex-shrink: 0; } }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1 id="admin-title">Painel de Controlo</h1>
        <p style="opacity: 0.6; font-size: 0.9rem;">Gestão de Agendamentos e Serviços</p>
    </header>

    <div class="admin-layout">
        <aside>
            <ul class="admin-menu">
                <li><button class="active" onclick="switchTab('panel-agenda', this)"><i class="fas fa-calendar-alt"></i> Agenda</button></li>
                <li><button onclick="switchTab('panel-perfil', this)"><i class="fas fa-user-circle"></i> Perfil</button></li>
                <li><button onclick="switchTab('panel-servicos', this)"><i class="fas fa-concierge-bell"></i> Serviços</button></li>
                <li><button onclick="switchTab('panel-horarios', this)"><i class="fas fa-clock"></i> Horários & Dias</button></li>
                <li><button onclick="switchTab('panel-galeria', this)"><i class="fas fa-images"></i> Galeria</button></li>
                <li><a id="btn-ver-site" href="#" target="_blank" class="btn btn-primary" style="width:100%; text-decoration:none; margin-top:10px;">Ver Site</a></li>
            </ul>
        </aside>

        <main id="main-content" style="opacity: 0.5; pointer-events: none;">
            
            <section id="panel-agenda" class="admin-panel active">
                <h2 class="section-title">Próximos Clientes</h2>
                <div id="lista-agendamentos" class="card">
                    <p style="text-align:center; opacity:0.5;">A carregar agendamentos...</p>
                </div>
            </section>

            <section id="panel-perfil" class="admin-panel">
                <h2 class="section-title">Configurar Perfil</h2>
                <div class="card">
                    <form id="form-perfil">
                        <div class="form-group" style="text-align: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 25px;">
                            <label>Foto de Perfil (Fundo transparente .PNG ideal)</label>
                            
                            <img id="preview-img-perfil" class="preview-avatar" src="" alt="Sua Foto">
                            <div id="placeholder-img-perfil" class="placeholder-avatar"><i class="fas fa-camera"></i></div>
                            
                            <input type="file" id="upload-img-perfil" accept="image/*" style="display:none;" onchange="uploadFotoPerfil(event)">
                            <button type="button" class="btn btn-primary" onclick="document.getElementById('upload-img-perfil').click()">
                                <i class="fas fa-upload"></i> Subir Foto
                            </button>
                        </div>

                        <div class="form-group">
                            <label>Instagram da Loja</label>
                            <input type="text" id="input-instagram" placeholder="Ex: @seu.studio">
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-save"></i> Salvar Perfil</button>
                    </form>
                </div>
            </section>

            <section id="panel-servicos" class="admin-panel">
                <h2 class="section-title">Categorias de Serviços</h2>
                <div class="card">
                    <div class="form-group" style="display:flex; gap:10px;">
                        <input type="text" id="nova-categoria" placeholder="Ex: Estética, Massagem..." style="flex:1;">
                        <button onclick="addCategoria()" class="btn btn-primary">Adicionar</button>
                    </div>
                    <div id="lista-categorias" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
                </div>

                <h2 class="section-title">Novo Serviço</h2>
                <div class="card">
                    <form id="form-servico">
                        <div class="form-group">
                            <label>Categoria</label>
                            <select id="serv-cat" required>
                                <option value="" disabled selected>Aguardando categorias...</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Nome do Serviço</label><input type="text" id="serv-nome" placeholder="Ex: Volume Russo" required></div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap:15px;">
                            <div class="form-group"><label>Duração (Ex: 2h 30m)</label><input type="text" id="serv-duracao" required></div>
                            <div class="form-group"><label>Valor (Ex: R$ 180,00)</label><input type="text" id="serv-valor" required></div>
                        </div>
                        <button type="submit" class="btn btn-primary">Adicionar Serviço</button>
                    </form>
                </div>
                <h2 class="section-title">Serviços Ativos</h2>
                <div id="lista-servicos"></div>
            </section>

            <section id="panel-horarios" class="admin-panel">
                <h2 class="section-title">Dias de Atendimento</h2>
                <div class="card">
                    <div id="dias-check" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;"></div>
                    <button onclick="salvarDias()" class="btn btn-primary">Atualizar Dias</button>
                </div>
                
                <h2 class="section-title">Grade de Horários Base</h2>
                <div class="card">
                    <div class="form-group" style="display:flex; gap:10px;">
                        <input type="time" id="input-novo-horario" style="flex:1;">
                        <button onclick="addHorarioBase()" class="btn btn-primary">Add</button>
                    </div>
                    <div id="lista-horarios-base" class="grid-horarios"></div>
                </div>
            </section>

            <section id="panel-galeria" class="admin-panel">
                <h2 class="section-title">Adicionar Fotos</h2>
                <div class="card">
                    <input type="file" id="upload-galeria" accept="image/*" style="display:none;" onchange="uploadImagem(event)">
                    <button onclick="document.getElementById('upload-galeria').click()" class="btn btn-primary"><i class="fas fa-upload"></i> Subir Foto</button>
                </div>
                <div id="grid-galeria" class="gallery-grid card"></div>
            </section>

        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://ikkjgtgvohrwurtiustm.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlra2pndGd2b2hyd3VydGl1c3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzE4OTEsImV4cCI6MjA5MDE0Nzg5MX0.HNrSvCmSHWTe2yoQy27GOq5g_ZoZxFdox_eCW14f_nI';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const slug = new URLSearchParams(window.location.search).get('loja');
        let lojaId = null;
        let IMGBB_KEY = '351d3ebf4dcd475e4f3522a6198ef849';
        let urlImagemPerfilAtual = null;

        function switchTab(id, btn) {
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.admin-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        async function init() {
            if(!slug) return alert("Erro: Loja não identificada.");
            const { data: loja } = await supabaseClient.from('lojas').select('*').eq('slug', slug).single();
            if(!loja) return; lojaId = loja.id;

            document.getElementById('admin-title').innerText = `Admin | ${loja.nome_loja}`;
            document.getElementById('btn-ver-site').href = `index_girl.html?loja=${slug}`;
            
            // Carrega info do Perfil
            if(loja.instagram) document.getElementById('input-instagram').value = loja.instagram;
            if(loja.perfil_imagem_url) {
                urlImagemPerfilAtual = loja.perfil_imagem_url;
                document.getElementById('preview-img-perfil').src = urlImagemPerfilAtual;
                document.getElementById('preview-img-perfil').style.display = 'block';
                document.getElementById('placeholder-img-perfil').style.display = 'none';
            }

            // Chave do ImgBB
            if(loja.textos) {
                const t = typeof loja.textos === 'string' ? JSON.parse(loja.textos) : loja.textos;
                if(t.api_imgbb_key) IMGBB_KEY = t.api_imgbb_key;
            }

            document.getElementById('main-content').style.opacity = '1';
            document.getElementById('main-content').style.pointerEvents = 'auto';

            renderAgenda(); renderCategorias(); renderServicos(); renderHorarios(); renderDias(); renderGaleria();
        }

        // --- PERFIL ---
        async function uploadFotoPerfil(event) {
            const file = event.target.files[0]; if(!file) return;
            const btn = event.target.nextElementSibling;
            const btnOld = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> A enviar...'; btn.disabled = true;

            const formData = new FormData(); formData.append('image', file); formData.append('key', IMGBB_KEY);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
                const json = await res.json();
                if(json.success) {
                    urlImagemPerfilAtual = json.data.url;
                    document.getElementById('preview-img-perfil').src = urlImagemPerfilAtual;
                    document.getElementById('preview-img-perfil').style.display = 'block';
                    document.getElementById('placeholder-img-perfil').style.display = 'none';
                } else {
                    alert("Erro ao subir imagem: " + json.error.message);
                }
            } catch(e) { alert("Erro de ligação no upload."); }
            
            btn.innerHTML = btnOld; btn.disabled = false;
        }

        document.getElementById('form-perfil').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const btnOld = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> A guardar...'; btn.disabled = true;

            let insta = document.getElementById('input-instagram').value.trim();
            if(insta && !insta.startsWith('@')) insta = '@' + insta;

            const { error } = await supabaseClient.from('lojas').update({
                instagram: insta,
                perfil_imagem_url: urlImagemPerfilAtual
            }).eq('id', lojaId);

            if(error) alert("Erro ao guardar perfil: " + error.message);
            else alert("Perfil atualizado com sucesso!");

            btn.innerHTML = btnOld; btn.disabled = false;
        };

        // --- AGENDA ---
        async function renderAgenda() {
            const container = document.getElementById('lista-agendamentos');
            const { data } = await supabaseClient.from('agendamentos').select('*').eq('loja_id', lojaId).order('data_agendamento', {ascending: true});
            container.innerHTML = data?.length ? '' : '<p style="text-align:center; opacity:0.5;">Sem agendamentos futuros.</p>';
            data?.forEach(ag => {
                container.innerHTML += `
                    <div class="manage-item">
                        <div>
                            <strong style="color:var(--accent);">${ag.data_agendamento.split('-').reverse().join('/')} às ${ag.horario}</strong><br>
                            <span>${ag.nome_cliente} - ${ag.servico}</span>
                        </div>
                        <button onclick="deleteItem('agendamentos', '${ag.id}', renderAgenda)" class="btn btn-danger"><i class="fas fa-times"></i></button>
                    </div>
                `;
            });
        }

        // --- CATEGORIAS ---
        async function renderCategorias() {
            const container = document.getElementById('lista-categorias');
            const select = document.getElementById('serv-cat');
            const { data } = await supabaseClient.from('categorias').select('*').eq('loja_id', lojaId);
            
            container.innerHTML = '';
            select.innerHTML = '';
            
            if (!data || data.length === 0) {
                container.innerHTML = '<p style="opacity:0.5; font-size:0.9rem;">Nenhuma categoria criada.</p>';
                select.innerHTML = '<option value="" disabled selected>Crie uma categoria primeiro...</option>';
                return;
            }

            data.forEach(c => {
                container.innerHTML += `
                    <div style="background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:20px; border:1px solid var(--glass-border); display:flex; align-items:center; gap:10px;">
                        <span>${c.nome}</span>
                        <i class="fas fa-times" style="color:#ef4444; cursor:pointer;" onclick="deleteItem('categorias', '${c.id}', renderCategorias)"></i>
                    </div>
                `;
                select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
            });
        }

        async function addCategoria() {
            const nome = document.getElementById('nova-categoria').value;
            if(!nome) return;
            
            const btn = event.target;
            const { error } = await supabaseClient.from('categorias').insert([{ loja_id: lojaId, nome }]);
            
            if(error) {
                alert("Erro ao guardar categoria: " + error.message);
                return;
            }
            
            document.getElementById('nova-categoria').value = '';
            renderCategorias();
        }

        // --- SERVIÇOS ---
        async function renderServicos() {
            const container = document.getElementById('lista-servicos');
            const { data } = await supabaseClient.from('servicos').select('*').eq('loja_id', lojaId);
            container.innerHTML = '';
            data?.forEach(s => {
                container.innerHTML += `
                    <div class="card manage-item">
                        <div>
                            <strong style="color:var(--accent);">${s.nome}</strong><br>
                            <small>${s.categoria.toUpperCase()} | ${s.duracao} | ${s.valor}</small>
                        </div>
                        <button onclick="deleteItem('servicos', '${s.id}', renderServicos)" class="btn btn-danger"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
        }

        document.getElementById('form-servico').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.from('servicos').insert([{
                loja_id: lojaId,
                categoria: document.getElementById('serv-cat').value,
                nome: document.getElementById('serv-nome').value,
                duracao: document.getElementById('serv-duracao').value,
                valor: document.getElementById('serv-valor').value
            }]);

            if(error) {
                alert("Erro ao guardar serviço: " + error.message);
                return;
            }

            e.target.reset(); 
            renderServicos();
        };

        // --- HORÁRIOS & DIAS ---
        async function renderHorarios() {
            const container = document.getElementById('lista-horarios-base');
            const { data } = await supabaseClient.from('horarios').select('*').eq('loja_id', lojaId);
            container.innerHTML = '';
            data?.sort((a,b) => a.horario.localeCompare(b.horario)).forEach(h => {
                container.innerHTML += `
                    <div class="horario-tag">
                        <span>${h.horario}</span>
                        <i class="fas fa-times" style="color:#ef4444; cursor:pointer;" onclick="deleteItem('horarios', '${h.id}', renderHorarios)"></i>
                    </div>
                `;
            });
        }

        async function addHorarioBase() {
            const h = document.getElementById('input-novo-horario').value;
            if(!h) return;
            
            const { error } = await supabaseClient.from('horarios').insert([{ loja_id: lojaId, horario: h }]);
            
            if(error) {
                alert("Erro ao guardar horário: " + error.message);
                return;
            }
            
            renderHorarios();
        }

        async function renderDias() {
            const { data } = await supabaseClient.from('config_dias').select('selecionados').eq('loja_id', lojaId).single();
            const selecionados = data?.selecionados || [1,2,3,4,5,6];
            const container = document.getElementById('dias-check');
            const nomes = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            container.innerHTML = '';
            nomes.forEach((n, i) => {
                container.innerHTML += `
                    <label style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; border:1px solid var(--glass-border); cursor:pointer;">
                        <input type="checkbox" value="${i}" ${selecionados.includes(i) ? 'checked' : ''} class="check-dia"> ${n}
                    </label>
                `;
            });
        }

        async function salvarDias() {
            const selecionados = Array.from(document.querySelectorAll('.check-dia:checked')).map(el => parseInt(el.value));
            const { error } = await supabaseClient.from('config_dias').upsert({ loja_id: lojaId, selecionados }, { onConflict: 'loja_id' });
            if(!error) alert("Dias atualizados!");
        }

        // --- GALERIA ---
        async function renderGaleria() {
            const container = document.getElementById('grid-galeria');
            const { data } = await supabaseClient.from('lookbook').select('*').eq('loja_id', lojaId);
            container.innerHTML = '';
            data?.forEach(f => {
                container.innerHTML += `<div class="gallery-item"><img src="${f.imagem_url}"><button class="btn-del-img" onclick="deleteItem('lookbook', '${f.id}', renderGaleria)">×</button></div>`;
            });
        }

        async function uploadImagem(event) {
            const file = event.target.files[0]; if(!file) return;
            const formData = new FormData(); formData.append('image', file); formData.append('key', IMGBB_KEY);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
                const json = await res.json();
                if(json.success) {
                    await supabaseClient.from('lookbook').insert([{ loja_id: lojaId, imagem_url: json.data.url }]);
                    renderGaleria();
                }
            } catch(e) { alert("Erro no upload."); }
        }

        // --- HELPER ---
        async function deleteItem(table, id, callback) {
            if(confirm("Deseja realmente excluir?")) {
                await supabaseClient.from(table).delete().eq('id', id);
                callback();
            }
        }

        init();
    </script>
</body>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS Master | Editor de Código</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --bg-vscode: #1e1e1e; --bg-sidebar: #252526; --bg-header: #333333; --text-main: #cccccc; --accent: #007acc; --border-color: #3e3e42; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-vscode); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--bg-header); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); height: 50px; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header h1 { font-size: 1rem; font-weight: normal; color: #fff; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-action { color: white; border: none; padding: 6px 15px; cursor: pointer; font-size: 0.85rem; border-radius: 2px; display: flex; align-items: center; gap: 6px; }
        .btn-save { background: var(--accent); }
        .btn-paste { background: #8b5cf6; } 
        .btn-download { background: #4b5563; }
        .main-container { display: flex; flex: 1; height: calc(100vh - 50px); position: relative; }
        .sidebar { width: 250px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 100; }
        .file-list { list-style: none; flex: 1; overflow-y: auto; }
        .file-item { padding: 8px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; border-left: 3px solid transparent; }
        .file-item.active { background: #37373d; color: #fff; border-left-color: var(--accent); }
        .file-item i.html { color: #e34c26; }
        .file-item i.css { color: #264de4; }
        .file-item i.js { color: #f1e05a; }
        .editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #monaco-editor { flex: 1; width: 100%; height: 100%; }
        #loading-overlay { position: absolute; inset: 0; background: var(--bg-vscode); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; gap: 10px; }
        @media (max-width: 768px) { .sidebar { display: none; } .hide-mobile { display: none; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1 id="loja-title"><i class="fas fa-code"></i> Editor de Código</h1>
        </div>
        <div class="header-actions">
            <button class="btn-action btn-paste" onclick="colarCodigo()"><i class="fas fa-paste"></i> <span class="hide-mobile">Colar</span></button>
            <button class="btn-action btn-download" onclick="baixarArquivo()"><i class="fas fa-download"></i> <span class="hide-mobile">Baixar</span></button>
            <button class="btn-action btn-save" onclick="salvarCodigo()"><i class="fas fa-save"></i> <span class="hide-mobile">Salvar</span></button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <div style="padding: 10px 15px; font-size: 0.7rem; color: #999; text-transform: uppercase;">Explorer</div>
            <ul class="file-list" id="file-list"></ul>
        </div>
        <div class="editor-container">
            <div id="monaco-editor"></div>
            <div id="loading-overlay">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
                <span>Iniciando ambiente...</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://ikkjgtgvohrwurtiustm.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlra2pndGd2b2hyd3VydGl1c3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzE4OTEsImV4cCI6MjA5MDE0Nzg5MX0.HNrSvCmSHWTe2yoQy27GOq5g_ZoZxFdox_eCW14f_nI';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('id');

        let editor, arquivos = {}, arquivoAtual = "", listaArquivos = [];

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});

        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: "",
                language: "html",
                theme: "vs-dark",
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false },
                wordWrap: "on"
            });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, salvarCodigo);
            carregarDados();
        });

        async function carregarDados() {
            try {
                if (!lojaId) return alert("ID da loja não encontrado.");
                
                const { data: loja, error } = await supabaseClient.from('lojas').select('*').eq('id', lojaId).single();
                if (error || !loja) throw new Error("Erro ao carregar loja.");

                document.getElementById('loja-title').innerText = "Editando: " + loja.nome_loja;

                if (loja.tipo_loja === 'salao') {
                    listaArquivos = [
                        { nome: 'index_girl', ext: 'html', lang: 'html', icon: 'fab fa-html5 html' },
                        { nome: 'admin_girl', ext: 'html', lang: 'html', icon: 'fab fa-html5 html' },
                        { nome: 'style', ext: 'css', lang: 'css', icon: 'fab fa-css3-alt css' },
                        { nome: 'script', ext: 'js', lang: 'javascript', icon: 'fab fa-js js' }
                    ];
                } else {
                    listaArquivos = [
                        { nome: 'index', ext: 'html', lang: 'html', icon: 'fab fa-html5 html' },
                        { nome: 'admin', ext: 'html', lang: 'html', icon: 'fab fa-html5 html' },
                        { nome: 'produto', ext: 'html', lang: 'html', icon: 'fab fa-html5 html' },
                        { nome: 'pay', ext: 'html', lang: 'html', icon: 'fab fa-html5 html' },
                        { nome: 'style', ext: 'css', lang: 'css', icon: 'fab fa-css3-alt css' },
                        { nome: 'script', ext: 'js', lang: 'javascript', icon: 'fab fa-js js' }
                    ];
                }

                let codigosSalvos = {};
                if (loja.codigo_customizado) {
                    codigosSalvos = typeof loja.codigo_customizado === 'string' 
                        ? JSON.parse(loja.codigo_customizado) 
                        : loja.codigo_customizado;
                }

                const fileListEl = document.getElementById('file-list');
                
                for (const arq of listaArquivos) {
                    const nomeComp = `${arq.nome}.${arq.ext}`;
                    
                    if (codigosSalvos[arq.nome] && codigosSalvos[arq.nome].length > 10) {
                        arquivos[arq.nome] = codigosSalvos[arq.nome];
                    } else {
                        try {
                            const res = await fetch(nomeComp + '?v=' + new Date().getTime());
                            arquivos[arq.nome] = res.ok ? await res.text() : "";
                        } catch { arquivos[arq.nome] = ""; }
                    }

                    const li = document.createElement('li');
                    li.className = 'file-item' + (arquivoAtual === "" ? " active" : "");
                    li.innerHTML = `<i class="${arq.icon}"></i> ${nomeComp}`;
                    li.onclick = (e) => trocarArquivo(e.currentTarget, arq.nome, arq.lang, arq.ext);
                    fileListEl.appendChild(li);

                    if (arquivoAtual === "") {
                        arquivoAtual = arq.nome;
                        editor.setValue(arquivos[arq.nome] || "");
                        monaco.editor.setModelLanguage(editor.getModel(), arq.lang);
                    }
                }

                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) {
                alert(e.message);
            }
        }

        function trocarArquivo(el, nome, lang, ext) {
            arquivos[arquivoAtual] = editor.getValue();
            
            document.querySelectorAll('.file-item').forEach(li => li.classList.remove('active'));
            el.classList.add('active');
            
            arquivoAtual = nome;
            editor.setValue(arquivos[nome] || "");
            monaco.editor.setModelLanguage(editor.getModel(), lang);
        }

        async function salvarCodigo() {
            arquivos[arquivoAtual] = editor.getValue();
            const btn = document.querySelector('.btn-save');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const { error } = await supabaseClient.from('lojas').update({ codigo_customizado: arquivos }).eq('id', lojaId);
            
            setTimeout(() => {
                btn.innerHTML = error ? '<i class="fas fa-times"></i> Erro' : '<i class="fas fa-check"></i> Salvo';
                setTimeout(() => btn.innerHTML = '<i class="fas fa-save"></i> <span class="hide-mobile">Salvar</span>', 2000);
            }, 500);
        }

        async function colarCodigo() {
            try {
                const text = await navigator.clipboard.readText();
                if (confirm("Substituir todo o código desta aba pelo conteúdo da área de transferência?")) {
                    editor.setValue(text);
                }
            } catch { alert("Erro ao acessar área de transferência."); }
        }

        function baixarArquivo() {
            const blob = new Blob([editor.getValue()], { type: "text/plain" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = arquivoAtual + ".txt";
            a.click();
        }
    </script>
</body>
</html>

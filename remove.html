<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Removedor de Fundo</title>
    <style>
        /* Reset e Base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 20px;
        }

        /* Container Glassmorphism */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            color: #ffffff;
        }

        /* Títulos e Textos */
        h1 { margin-bottom: 24px; font-size: 1.5rem; font-weight: 600; }
        p { font-size: 0.9rem; color: #ccc; margin-bottom: 10px; }

        /* Botões e Inputs */
        input[type="file"] { display: none; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: center;
            border: none;
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            margin-bottom: 20px;
        }
        .upload-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .download-btn {
            background: #00c6ff;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            margin-top: 20px;
            display: none; /* Oculto até a imagem ficar pronta */
        }
        .download-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Área de Preview e Loading */
        .preview-container { display: none; margin-top: 20px; }
        img { 
            max-width: 100%; 
            border-radius: 12px; 
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgDwYC1ASMBg2sAGPEKjIweDP///x/EQIxgNCsYvQkMzQpGbA1DBgCqWwY5yE23fQAAAABJRU5ErkJggg=='); /* Background quadriculado para ver a transparência */
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .loading { 
            display: none; 
            margin: 20px 0; 
            font-size: 0.95rem; 
            color: #00c6ff; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Remover Fundo de Imagem</h1>
    
    <label for="imageInput" class="btn upload-btn">
        📁 Escolher Imagem
    </label>
    <input type="file" id="imageInput" accept="image/*">

    <div class="loading" id="loadingMsg">Processando imagem com IA...</div>

    <div class="preview-container" id="previewContainer">
        <p>Pronto! Fundo removido:</p>
        <img id="resultImage" src="" alt="Imagem com fundo transparente">
        <button class="btn download-btn" id="downloadBtn">⬇️ Baixar Imagem</button>
    </div>
</div>

<script>
    // PASSO IMPORTANTE: Insira sua chave da API do remove.bg abaixo
    // Você consegue uma chave gratuita em: https://www.remove.bg/api
    const API_KEY = '1Lyx6yDgtps3VMgETEGaYcWC';

    const imageInput = document.getElementById('imageInput');
    const loadingMsg = document.getElementById('loadingMsg');
    const previewContainer = document.getElementById('previewContainer');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let currentBlobURL = null; // Para gerenciar a memória do navegador

    imageInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        // Reseta a interface
        previewContainer.style.display = 'none';
        downloadBtn.style.display = 'none';
        loadingMsg.style.display = 'block';

        // Prepara os dados para envio
        const formData = new FormData();
        formData.append('size', 'auto');
        formData.append('image_file', file);

        try {
            // Faz a requisição para a API
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: {
                    'X-Api-Key': API_KEY,
                },
                body: formData
            });

            if (!response.ok) {
                throw new Error(`Erro: ${response.status} - Verifique se a chave API é válida.`);
            }

            // Converte a resposta em um Blob (arquivo de imagem)
            const blob = await response.blob();
            
            // Limpa a URL anterior para evitar vazamento de memória
            if (currentBlobURL) URL.revokeObjectURL(currentBlobURL);
            
            // Cria uma URL local para a nova imagem
            currentBlobURL = URL.createObjectURL(blob);
            
            // Exibe a imagem e o botão de download
            resultImage.src = currentBlobURL;
            previewContainer.style.display = 'block';
            downloadBtn.style.display = 'block';

        } catch (error) {
            console.error('Falha na remoção do fundo:', error);
            alert('Não foi possível remover o fundo. Você inseriu sua Chave de API no código?');
        } finally {
            loadingMsg.style.display = 'none';
        }
    });

    // Lógica do botão de Download
    downloadBtn.addEventListener('click', () => {
        if (!currentBlobURL) return;
        
        const link = document.createElement('a');
        link.href = currentBlobURL;
        link.download = 'imagem_sem_fundo.png'; // Sempre salva como PNG para manter a transparência
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>
</body>
</html>

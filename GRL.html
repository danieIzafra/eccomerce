<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS Master | Gerador de Lojas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; position: fixed; top: 0; left: 0;
            background: var(--bg-dark); z-index: 9999; padding: 20px;
        }
        .login-box {
            background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border);
            text-align: center; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-box h2 { margin-bottom: 10px; color: var(--text-main); }
        .login-box p { color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem; }
        .login-box input {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 8px; color: white; margin-bottom: 20px; text-align: center; letter-spacing: 2px;
        }
        .login-box input:focus { outline: none; border-color: var(--accent); }

        /* --- PAINEL PRINCIPAL --- */
        #admin-content { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: var(--accent); }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-success:hover { background: var(--success); color: white; }
        .btn-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .btn-warning:hover { background: var(--warning); color: white; }

        /* --- SESSÃO DE CRIAR LOJA --- */
        .create-store-card { background: var(--bg-card); padding: 30px; border-radius: 16px; border: 1px dashed var(--accent); margin-bottom: 40px; transition: 0.3s ease; }
        .create-store-card h3 { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .input-group input, .input-group select { padding: 14px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: white; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--accent); }

        /* --- LISTA DE LOJAS --- */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .store-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 25px; transition: 0.3s; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .store-card:hover { border-color: var(--text-muted); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-active { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-inactive { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .store-card.inactive { opacity: 0.7; border-color: rgba(239, 68, 68, 0.3); }

        .store-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 5px; padding-right: 80px; line-height: 1.2; }
        .store-slug { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; font-family: monospace; background: var(--bg-dark); padding: 5px 10px; border-radius: 6px; display: inline-block; word-break: break-all; margin-top: 10px; }
        
        .store-actions { display: flex; flex-wrap: wrap; gap: 10px; border-top: 1px solid var(--border); padding-top: 20px; margin-top: auto; }
        .store-actions .btn { flex: 1; font-size: 0.85rem; padding: 12px 10px; }

        /* Ícone de Toggle exclusivo para mobile */
        .mobile-toggle-icon { display: none; transition: transform 0.3s ease; }
        .mobile-toggle-icon.open { transform: rotate(180deg); }

        /* OTIMIZAÇÕES MOBILE */
        @media (max-width: 768px) {
            #admin-content { padding: 20px 15px; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; }
            .header h1 { font-size: 1.4rem; }
            .header button { width: 100%; } 
            .create-store-card { padding: 20px; margin-bottom: 25px; }
            .create-store-card h3 { font-size: 1.1rem; margin-bottom: 0; cursor: pointer; user-select: none; }
            .mobile-toggle-icon { display: block; color: var(--accent); }
            .form-grid { display: none; margin-top: 20px; grid-template-columns: 1fr; }
            .form-grid.active { display: grid; }
            .store-grid { grid-template-columns: 1fr; gap: 15px; }
            .store-card { padding: 20px; }
            .store-name { font-size: 1.2rem; }
            .store-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .store-actions .btn-full { grid-column: span 2; }
        }
        @media (min-width: 769px) { .form-grid { display: grid !important; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-fingerprint" style="font-size: 3rem; color: var(--accent); margin-bottom: 20px;"></i>
            <h2>Sistema SaaS Master</h2>
            <p>Gerador e Rastreador de Lojas (GRL)</p>
            <input type="password" id="master-password" placeholder="••••••••" onkeypress="if(event.key === 'Enter') verificarSenha()">
            <button class="btn btn-primary" style="width: 100%;" onclick="verificarSenha()">
                Autenticar <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <h1><i class="fas fa-network-wired"></i> GRL Master Dashboard</h1>
            <button class="btn btn-danger" onclick="bloquearPainel()">
                <i class="fas fa-lock"></i> Bloquear Painel
            </button>
        </div>

        <div class="create-store-card">
            <h3 onclick="toggleCreateForm()">
                <span><i class="fas fa-rocket"></i> Lançar Novo Cliente</span>
                <i class="fas fa-chevron-down mobile-toggle-icon" id="create-icon"></i>
            </h3>
            
            <div class="form-grid" id="create-form">
                <div class="input-group">
                    <label>Nome do Cliente</label>
                    <input type="text" id="new-nome" placeholder="Ex: Aura Store, Studio Beleza...">
                </div>
                <div class="input-group">
                    <label>Slug (Link)</label>
                    <input type="text" id="new-slug" placeholder="ex: aura-store" oninput="formatarSlug(this)">
                </div>
                <div class="input-group">
                    <label>Tipo de Negócio</label>
                    <select id="new-tipo">
                        <option value="ecommerce">E-commerce (Produtos)</option>
                        <option value="salao">Salão/Beleza (Agendamentos)</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="height: 48px;" onclick="criarNovaLoja()" id="btn-create">
                    <i class="fas fa-plus-circle"></i> Gerar Cliente
                </button>
                <small style="color: var(--text-muted); grid-column: 1 / -1; margin-top: -5px;">
                    * O Slug será a URL de acesso do cliente. Ex: index.html?loja=<b>slug-aqui</b>
                </small>
            </div>
        </div>

        <div>
            <h3 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 1.1rem;">
                <i class="fas fa-server"></i> Lojas Hospedadas na Plataforma
            </h3>
            <div class="store-grid" id="lista-todas-lojas">
                <p style="color: var(--text-muted);">Consultando banco de dados...</p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SISTEMA DE SEGURANÇA E LOGIN (SEM EXPOR SENHA)
        // ==========================================
        
        function gerarHashDaSenha(string) {
            let hash = 0;
            for (let i = 0; i < string.length; i++) {
                hash = (hash << 5) - hash + string.charCodeAt(i);
                hash |= 0; 
            }
            return hash;
        }

        const HASH_CORRETO = 1515115; 

        window.onload = () => {
            if (localStorage.getItem('grl_auth_session') === 'autenticado') {
                liberarAcessoAoPainel();
            }
        };

        function verificarSenha() {
            const input = document.getElementById('master-password').value;
            const hashDoInput = gerarHashDaSenha(input);

            if (hashDoInput === HASH_CORRETO) {
                localStorage.setItem('grl_auth_session', 'autenticado');
                liberarAcessoAoPainel();
            } else {
                alert("⛔ Acesso Negado: Senha Incorreta.");
                document.getElementById('master-password').value = '';
            }
        }

        function liberarAcessoAoPainel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'flex';
            document.getElementById('admin-content').style.flexDirection = 'column';
            listarLojas(); 
        }

        function bloquearPainel() {
            localStorage.removeItem('grl_auth_session');
            location.reload();
        }

        // ==========================================
        // 2. LÓGICA DE UI MOBILE (ACORDEÃO)
        // ==========================================
        function toggleCreateForm() {
            if (window.innerWidth <= 768) {
                const form = document.getElementById('create-form');
                const icon = document.getElementById('create-icon');
                form.classList.toggle('active');
                icon.classList.toggle('open');
            }
        }

        // ==========================================
        // 3. CONEXÃO COM O SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://ikkjgtgvohrwurtiustm.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlra2pndGd2b2hyd3VydGl1c3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzE4OTEsImV4cCI6MjA5MDE0Nzg5MX0.HNrSvCmSHWTe2yoQy27GOq5g_ZoZxFdox_eCW14f_nI';

        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function formatarSlug(input) {
            input.value = input.value.toLowerCase().trim().replace(/[\s_]+/g, '-').replace(/[^\w-]+/g, '');
        }

        // ==========================================
        // 4. CRIAR NOVA LOJA / SALÃO
        // ==========================================
        async function criarNovaLoja() {
            const nome = document.getElementById('new-nome').value;
            const slug = document.getElementById('new-slug').value;
            const tipo = document.getElementById('new-tipo').value;
            const btn = document.getElementById('btn-create');

            if (!nome || !slug) return alert("⚠️ Preencha o nome e o slug da loja!");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando...';
            btn.disabled = true;

            const { error } = await supabaseClient
                .from('lojas')
                .insert([{ 
                    nome_loja: nome, 
                    slug: slug, 
                    tipo_loja: tipo,
                    cor_principal: tipo === 'salao' ? '#ec4899' : '#00d2ff',
                    ativo: true
                }]);

            if (error) {
                if(error.code === '23505') { 
                    alert("⛔ Este Slug já está em uso! Escolha outro.");
                } else {
                    alert("Erro ao criar: " + error.message);
                }
            } else {
                document.getElementById('new-nome').value = "";
                document.getElementById('new-slug').value = "";
                
                const form = document.getElementById('create-form');
                if(form.classList.contains('active')) toggleCreateForm();
                
                listarLojas();
            }

            btn.innerHTML = '<i class="fas fa-plus-circle"></i> Gerar Cliente';
            btn.disabled = false;
        }

        // ==========================================
        // 5. LISTAR TODAS AS LOJAS E SALÕES
        // ==========================================
        async function listarLojas() {
            const container = document.getElementById('lista-todas-lojas');
            
            const { data: lojas, error } = await supabaseClient
                .from('lojas')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p style="color:var(--danger)">Erro de conexão: ${error.message}</p>`;
                return;
            }

            container.innerHTML = ""; 

            if (lojas.length === 0) {
                container.innerHTML = "<p style='color:var(--text-muted)'>Nenhum cliente cadastrado ainda. Crie a sua primeira loja acima!</p>";
                return;
            }

            lojas.forEach(loja => {
                const isAtiva = loja.ativo !== false; 
                const cardClass = isAtiva ? "store-card" : "store-card inactive";
                const badgeClass = isAtiva ? "status-badge status-active" : "status-badge status-inactive";
                const badgeTexto = isAtiva ? "ONLINE" : "BLOQUEADA";
                
                const toggleBtnClass = isAtiva ? "btn btn-warning btn-full" : "btn btn-success btn-full";
                const toggleBtnIcon = isAtiva ? "fas fa-pause" : "fas fa-play";
                const toggleBtnTexto = isAtiva ? "Suspender Acesso" : "Reativar Acesso";

                // Lógica de URL e Badge para E-commerce vs Salão
                const urlIndex = loja.tipo_loja === 'salao' ? 'index_girl.html' : 'index.html';
                const urlAdmin = loja.tipo_loja === 'salao' ? 'admin_girl.html' : 'admin.html';
                const badgeTipo = loja.tipo_loja === 'salao' 
                    ? '<span style="color:#ec4899; font-size:0.85rem; margin-top:5px; display:inline-block;"><i class="fas fa-spa"></i> Salão / Agendamentos</span>' 
                    : '<span style="color:#00d2ff; font-size:0.85rem; margin-top:5px; display:inline-block;"><i class="fas fa-shopping-cart"></i> E-commerce</span>';

                container.innerHTML += `
                    <div class="${cardClass}">
                        <div class="${badgeClass}">${badgeTexto}</div>
                        <div class="store-name">${loja.nome_loja} <br>${badgeTipo}</div>
                        <div class="store-slug"><i class="fas fa-link"></i> ?loja=${loja.slug}</div>
                        
                        <div class="store-actions">
                            <a href="${urlIndex}?loja=${loja.slug}" target="_blank" class="btn btn-primary" title="Ver Site">
                                <i class="fas fa-external-link-alt"></i> Vitrine
                            </a>
                            <a href="${urlAdmin}?loja=${loja.slug}" target="_blank" class="btn" style="background:#334155; color:white;" title="Painel interno do cliente">
                                <i class="fas fa-cog"></i> Admin
                            </a>
                            <button onclick="alternarStatus('${loja.id}', ${isAtiva})" class="${toggleBtnClass}">
                                <i class="${toggleBtnIcon}"></i> ${toggleBtnTexto}
                            </button>
                            <button onclick="excluirLoja('${loja.id}', '${loja.nome_loja}')" class="btn btn-danger btn-full" title="Apagar cliente e todos os dados">
                                <i class="fas fa-trash"></i> Excluir Cliente
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // ==========================================
        // 6. ATIVAR / BLOQUEAR
        // ==========================================
        async function alternarStatus(id, statusAtual) {
            const novoStatus = !statusAtual; 
            const msg = novoStatus ? 
                "Tem certeza que deseja reativar o acesso deste cliente?" : 
                "Deseja suspender este cliente? Os links pararão de funcionar para o público.";
                
            if(confirm(msg)) {
                const { error } = await supabaseClient
                    .from('lojas')
                    .update({ ativo: novoStatus })
                    .eq('id', id);

                if (error) {
                    alert("Erro ao alterar o status: " + error.message);
                } else {
                    listarLojas(); 
                }
            }
        }

        // ==========================================
        // 7. EXCLUIR CLIENTE E DADOS
        // ==========================================
        async function excluirLoja(id, nome) {
            const confirmar = confirm(`⚠️ ALERTA VERMELHO!\n\nTem certeza absoluta que deseja DELETAR o cliente "${nome}" e TODOS os seus dados (Produtos, Agendamentos, etc)?\n\nEsta ação é irreversível.`);
            
            if (confirmar) {
                // Apaga dependências de e-commerce e salão, tudo junto.
                await supabaseClient.from('avaliacoes').delete().eq('loja_id', id);
                await supabaseClient.from('produtos').delete().eq('loja_id', id);
                await supabaseClient.from('agendamentos').delete().eq('loja_id', id);
                await supabaseClient.from('servicos').delete().eq('loja_id', id);

                const { error } = await supabaseClient
                    .from('lojas')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert("Erro ao excluir: " + error.message);
                } else {
                    listarLojas(); 
                }
            }
        }
    </script>
</body>
</html>

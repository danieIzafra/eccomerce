<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS Master | AI Injector Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --accent-neon: #8b5cf6; 
            --bg-base: #0b0d14; 
            --bg-glass: rgba(255, 255, 255, 0.03); 
            --bg-input: rgba(0, 0, 0, 0.3); 
            --border-color: rgba(255, 255, 255, 0.06); 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --radius-md: 10px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { max-width: 600px; width: 100%; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header h1 i { color: var(--accent-neon); }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .panel { background: var(--bg-glass); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        /* Estilos dos Accordions */
        .accordion { background: var(--bg-glass); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 15px; overflow: hidden; transition: 0.3s; }
        .accordion-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; font-weight: 600; font-size: 1rem; }
        .accordion-header i.toggle-icon { transition: transform 0.3s ease; color: var(--text-muted); }
        .accordion.active { border-color: var(--accent-neon); box-shadow: 0 5px 20px rgba(139, 92, 246, 0.1); }
        .accordion.active .accordion-header i.toggle-icon { transform: rotate(180deg); color: var(--accent-neon); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; padding: 0 20px; }
        .accordion.active .accordion-content { max-height: 2000px; padding: 0 20px 20px; border-top: 1px solid var(--border-color); margin-top: 10px; padding-top: 20px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 14px 15px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-main); outline: none; font-size: 0.95rem; transition: 0.2s; }
        .form-control:focus { border-color: var(--accent-neon); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
        
        .upload-dropzone { border: 2px dashed var(--border-color); background: var(--bg-input); border-radius: var(--radius-md); padding: 30px 15px; text-align: center; cursor: pointer; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.3s; margin-bottom: 20px; }
        .upload-dropzone:hover { border-color: var(--accent-neon); color: var(--accent-neon); background: rgba(139, 92, 246, 0.05); }
        .upload-dropzone i { font-size: 2.5rem; }
        
        .btn-submit { width: 100%; padding: 16px; color: #fff; border: none; border-radius: var(--radius-md); font-weight: 800; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-submit:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.6; pointer-events: none; }
        
        .btn-primary { background: var(--accent-neon); box-shadow: 0 5px 15px rgba(139, 92, 246, 0.2); }
        .btn-lookbook { background: #10b981; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2); }
        .btn-design { background: #3b82f6; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2); }

        .log-container { margin-top: 25px; background: #000; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 15px; font-family: monospace; font-size: 0.85rem; color: #a3e635; max-height: 350px; overflow-y: auto; display: none; }
        .log-item { margin-bottom: 5px; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .log-item.error { color: #ef4444; }
        .log-item.success { color: #3b82f6; }
        .log-item.warning { color: #f59e0b; }
        .log-item.ai-data { color: #d946ef; padding-left: 10px; border-left: 2px solid #d946ef; margin: 5px 0; }
        
        .file-count { font-size: 0.75rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-brain"></i> IA Injector Pro</h1>
            <p>Configuração e catalogação em massa</p>
        </div>

        <div class="panel">
            <div class="form-group" style="margin-bottom: 0;">
                <label>Slug da Loja Alvo <span style="color:#ef4444">*</span></label>
                <input type="text" id="slug-loja" class="form-control" placeholder="ex: minha-loja-top" required>
            </div>
        </div>

        <div class="accordion active" id="acc-produtos">
            <div class="accordion-header" onclick="toggleAccordion('acc-produtos')">
                <span><i class="fas fa-box-open" style="color: var(--accent-neon); margin-right: 10px;"></i> Injetar Produtos (IA)</span>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="accordion-content">
                <form id="form-produtos">
                    <div class="form-group">
                        <label>Chave API do Google Gemini</label>
                        <input type="password" id="gemini-key" class="form-control" placeholder="AIzaSy..." required>
                    </div>

                    <div class="form-group">
                        <label>Fotos dos Produtos</label>
                        <div class="upload-dropzone" onclick="document.getElementById('file-upload-prod').click()">
                            <i class="fas fa-images"></i>
                            <span>Selecionar várias imagens</span>
                            <span id="count-prod" class="file-count" style="color: var(--accent-neon);"></span>
                        </div>
                        <input type="file" id="file-upload-prod" accept="image/*" multiple style="display: none;" onchange="updateFileCount('file-upload-prod', 'count-prod')">
                    </div>

                    <button type="submit" class="btn-submit btn-primary" id="btn-inj-prod">
                        <i class="fas fa-rocket"></i> Iniciar Injeção Inteligente
                    </button>
                </form>
            </div>
        </div>

        <div class="accordion" id="acc-lookbook">
            <div class="accordion-header" onclick="toggleAccordion('acc-lookbook')">
                <span><i class="fas fa-camera-retro" style="color: #10b981; margin-right: 10px;"></i> Injetar Lookbook</span>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="accordion-content">
                <form id="form-lookbook">
                    <div class="form-group">
                        <label>Fotos do Lookbook/Galeria</label>
                        <div class="upload-dropzone" onclick="document.getElementById('file-upload-lookbook').click()">
                            <i class="fas fa-photo-video"></i>
                            <span>Selecionar imagens para galeria</span>
                            <span id="count-lookbook" class="file-count" style="color: #10b981;"></span>
                        </div>
                        <input type="file" id="file-upload-lookbook" accept="image/*" multiple style="display: none;" onchange="updateFileCount('file-upload-lookbook', 'count-lookbook')">
                    </div>
                    <button type="submit" class="btn-submit btn-lookbook" id="btn-inj-lookbook">
                        <i class="fas fa-paper-plane"></i> Enviar para o Mural
                    </button>
                </form>
            </div>
        </div>

        <div class="accordion" id="acc-logo">
            <div class="accordion-header" onclick="toggleAccordion('acc-logo')">
                <span><i class="fas fa-image" style="color: #3b82f6; margin-right: 10px;"></i> Injetar Logo da Loja</span>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="accordion-content">
                <form id="form-logo">
                    <div class="form-group">
                        <label>Imagem da Logo (PNG ou JPEG)</label>
                        <div class="upload-dropzone" onclick="document.getElementById('file-upload-logo').click()">
                            <i class="fas fa-stamp"></i>
                            <span>Selecionar Logotipo</span>
                            <span id="count-logo" class="file-count" style="color: #3b82f6;"></span>
                        </div>
                        <input type="file" id="file-upload-logo" accept="image/png, image/jpeg" style="display: none;" onchange="updateFileCount('file-upload-logo', 'count-logo')">
                    </div>
                    <button type="submit" class="btn-submit btn-design" id="btn-inj-logo">
                        <i class="fas fa-upload"></i> Atualizar Logotipo
                    </button>
                </form>
            </div>
        </div>

        <div class="accordion" id="acc-hero">
            <div class="accordion-header" onclick="toggleAccordion('acc-hero')">
                <span><i class="fas fa-desktop" style="color: #f59e0b; margin-right: 10px;"></i> Injetar Capa (Hero)</span>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="accordion-content">
                <form id="form-hero">
                    <div class="form-group">
                        <label>Imagem de Capa (Hero Section)</label>
                        <div class="upload-dropzone" onclick="document.getElementById('file-upload-hero').click()">
                            <i class="fas fa-panorama"></i>
                            <span>Selecionar Imagem de Fundo</span>
                            <span id="count-hero" class="file-count" style="color: #f59e0b;"></span>
                        </div>
                        <input type="file" id="file-upload-hero" accept="image/*" style="display: none;" onchange="updateFileCount('file-upload-hero', 'count-hero')">
                    </div>
                    <button type="submit" class="btn-submit" style="background: #f59e0b; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2);" id="btn-inj-hero">
                        <i class="fas fa-upload"></i> Atualizar Capa
                    </button>
                </form>
            </div>
        </div>

        <div class="log-container" id="log-console"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ikkjgtgvohrwurtiustm.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlra2pndGd2b2hyd3VydGl1c3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzE4OTEsImV4cCI6MjA5MDE0Nzg5MX0.HNrSvCmSHWTe2yoQy27GOq5g_ZoZxFdox_eCW14f_nI';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const DEFAULT_IMGBB_KEY = '351d3ebf4dcd475e4f3522a6198ef849';

        // LER URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('loja')) {
            document.getElementById('slug-loja').value = params.get('loja');
        }

        // UI FUNÇÕES
        function toggleAccordion(id) {
            document.querySelectorAll('.accordion').forEach(acc => {
                if(acc.id !== id) acc.classList.remove('active');
            });
            document.getElementById(id).classList.toggle('active');
        }

        function updateFileCount(inputId, countId) {
            const files = document.getElementById(inputId).files;
            document.getElementById(countId).innerText = files.length > 0 ? `${files.length} arquivo(s) selecionado(s)` : '';
        }

        function writeLog(msg, type = 'info') {
            const consoleEl = document.getElementById('log-console');
            consoleEl.style.display = 'block';
            const time = new Date().toLocaleTimeString();
            consoleEl.innerHTML += `<div class="log-item ${type}">[${time}] ${msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // UTILITÁRIOS
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        async function uploadToImgBB(file, apiKey) {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', apiKey);
            const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (!data.success) throw new Error(data.error.message);
            return data.data.url;
        }

        async function validarConexaoLoja() {
            const slug = document.getElementById('slug-loja').value.trim();
            if (!slug) throw new Error("Preencha o Slug da Loja Alvo no topo da tela!");
            
            writeLog(`Buscando dados da loja: ${slug}...`);
            const { data: loja, error } = await supabaseClient.from('lojas').select('*').eq('slug', slug).single();
            if (error || !loja) throw new Error("Loja não encontrada no banco de dados.");
            return loja;
        }

        function getChaveImgBB(loja) {
            let imgbbKey = DEFAULT_IMGBB_KEY;
            if (loja.textos) {
                const textos = typeof loja.textos === 'string' ? JSON.parse(loja.textos) : loja.textos;
                if (textos.api_imgbb_key) imgbbKey = textos.api_imgbb_key;
            }
            return imgbbKey;
        }

        function capitalizarPrimeiraLetra(string) {
            if (!string) return 'Lançamentos';
            return string.charAt(0).toUpperCase() + string.slice(1).toLowerCase();
        }

        async function callGemini(base64Data, mimeType, apiKey) {
            const prompt = `Você é um sistema de catalogação de e-commerce. Analise a imagem fornecida.
            Retorne ESTRITAMENTE um JSON válido com a estrutura abaixo. NÃO USE crases ou markdown.
            {
              "nome": "Nome comercial persuasivo do produto",
              "preco": 149.90,
              "descricao": "Texto da descrição detalhada (Mínimo 500, máximo 600 caracteres).",
              "colecao": "Classifique em apenas UMA palavra ou duas (Ex: Tênis, Vestidos, Óculos, Moda Praia)",
              "tipo_tamanho": "MANDATÓRIO usar APENAS UMA destas 4 strings exatas: 'letras' (para roupas/camisas), 'numeros_roupa' (para calças), 'numeros_calcado' (para sapatos/tênis), ou 'unico' (para bonés/óculos/bolsas/relógios)",
              "comentarios": [
                {"nome": "Nome Fictício BR", "texto": "Avaliação 5 estrelas realista"}
              ]
            }`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: mimeType, data: base64Data } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || 'Falha na comunicação com o Gemini.');
            
            const rawText = data.candidates[0].content.parts[0].text;
            return JSON.parse(rawText);
        }

        // =====================================
        // 1. INJEÇÃO DE PRODUTOS (COM IA)
        // =====================================
        document.getElementById('form-produtos').addEventListener('submit', async (e) => {
            e.preventDefault();
            const geminiKey = document.getElementById('gemini-key').value.trim();
            const files = document.getElementById('file-upload-prod').files;
            const btn = document.getElementById('btn-inj-prod');

            if (files.length === 0) return alert("Selecione pelo menos uma imagem.");

            btn.disabled = true;
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando Injeção...';
            document.getElementById('log-console').innerHTML = '';

            try {
                const loja = await validarConexaoLoja();
                const imgbbKey = getChaveImgBB(loja);

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    writeLog(`=============================`);
                    writeLog(`Processando arquivo ${i + 1}/${files.length} (${file.name})`);

                    try {
                        const base64Str = await fileToBase64(file);
                        const b64Data = base64Str.split(',')[1];

                        writeLog(`>> Analisando imagem com Gemini Vision...`);
                        const iaData = await callGemini(b64Data, file.type, geminiKey);
                        
                        const tamanhosValidos = ['letras', 'numeros_roupa', 'numeros_calcado', 'unico'];
                        const tipoTamanho = tamanhosValidos.includes(iaData.tipo_tamanho) ? iaData.tipo_tamanho : 'unico';
                        const nomeColecao = capitalizarPrimeiraLetra(iaData.colecao);

                        writeLog(`Nome: ${iaData.nome}`, 'ai-data');
                        writeLog(`Coleção: ${nomeColecao}`, 'ai-data');

                        const { data: colExistente } = await supabaseClient.from('colecoes').select('id, nome').eq('loja_id', loja.id).ilike('nome', nomeColecao).maybeSingle();

                        if (!colExistente) {
                            writeLog(`>> Criando coleção '${nomeColecao}'...`, 'warning');
                            await supabaseClient.from('colecoes').insert([{ loja_id: loja.id, nome: nomeColecao }]);
                        }

                        writeLog(`>> Hospedando imagem no ImgBB...`);
                        const imgUrl = await uploadToImgBB(file, imgbbKey);

                        writeLog(`>> Salvando Produto...`);
                        const payloadProduto = {
                            loja_id: loja.id, nome: iaData.nome, preco: parseFloat(iaData.preco),
                            descricao: iaData.descricao, imagem_url: imgUrl, imagens: [imgUrl],
                            tipo_tamanho: tipoTamanho, colecao: nomeColecao, frete_gratis: false
                        };

                        const { data: newProd, error: errProd } = await supabaseClient.from('produtos').insert([payloadProduto]).select();
                        if (errProd) throw errProd;
                        
                        if (iaData.comentarios && iaData.comentarios.length > 0) {
                            writeLog(`>> Injetando avaliações...`);
                            const avaliacoes = iaData.comentarios.map(c => ({
                                loja_id: loja.id, produto_id: newProd[0].id,
                                nome: c.nome, comentario: c.texto, aprovado: true
                            }));
                            await supabaseClient.from('avaliacoes').insert(avaliacoes);
                        }

                        writeLog(`V Produto injetado com sucesso!`, 'success');

                    } catch (itemErr) {
                        writeLog(`X Falha: ${itemErr.message}`, 'error');
                    }
                }
                writeLog(`Lote finalizado!`, 'success');

            } catch (err) { writeLog(err.message, 'error'); }

            btn.disabled = false; btn.innerHTML = textoOriginal;
            document.getElementById('file-upload-prod').value = '';
            document.getElementById('count-prod').innerText = '';
        });

        // =====================================
        // 2. INJEÇÃO DE LOOKBOOK
        // =====================================
        document.getElementById('form-lookbook').addEventListener('submit', async (e) => {
            e.preventDefault();
            const files = document.getElementById('file-upload-lookbook').files;
            const btn = document.getElementById('btn-inj-lookbook');

            if (files.length === 0) return alert("Selecione fotos para o Lookbook.");

            btn.disabled = true;
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Injetando Lookbook...';
            document.getElementById('log-console').innerHTML = '';

            try {
                const loja = await validarConexaoLoja();
                const imgbbKey = getChaveImgBB(loja);

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    writeLog(`=============================`);
                    writeLog(`Hospedando imagem Lookbook ${i + 1}/${files.length}...`);
                    
                    try {
                        const imgUrl = await uploadToImgBB(file, imgbbKey);
                        writeLog(`>> Inserindo no banco de dados...`);
                        await supabaseClient.from('lookbook').insert([{ loja_id: loja.id, imagem_url: imgUrl }]);
                        writeLog(`V Imagem salva com sucesso!`, 'success');
                    } catch(itemErr) {
                        writeLog(`X Erro: ${itemErr.message}`, 'error');
                    }
                }
                writeLog(`Mural do Lookbook atualizado!`, 'success');

            } catch (err) { writeLog(err.message, 'error'); }

            btn.disabled = false; btn.innerHTML = textoOriginal;
            document.getElementById('file-upload-lookbook').value = '';
            document.getElementById('count-lookbook').innerText = '';
        });

        // =====================================
        // 3. INJEÇÃO DE DESIGN (LOGO & HERO)
        // =====================================
        async function injetarImagemDesign(inputId, btnId, chaveJsonTexto, logMensagem) {
            const files = document.getElementById(inputId).files;
            const btn = document.getElementById(btnId);

            if (files.length === 0) return alert("Selecione uma imagem primeiro.");

            btn.disabled = true;
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Atualizando...';
            document.getElementById('log-console').innerHTML = '';

            try {
                const loja = await validarConexaoLoja();
                const imgbbKey = getChaveImgBB(loja);

                writeLog(`=============================`);
                writeLog(logMensagem);
                
                const imgUrl = await uploadToImgBB(files[0], imgbbKey);
                writeLog(`>> Imagem hospedada: ${imgUrl}`);

                // Atualizar o JSON de textos
                let textos = {};
                if (loja.textos) {
                    textos = typeof loja.textos === 'string' ? JSON.parse(loja.textos) : loja.textos;
                }
                
                textos[chaveJsonTexto] = imgUrl;

                writeLog(`>> Atualizando banco de dados...`);
                const { error } = await supabaseClient.from('lojas').update({ textos: textos }).eq('id', loja.id);
                
                if (error) throw error;
                writeLog(`V Design atualizado com sucesso!`, 'success');

            } catch (err) { writeLog(err.message, 'error'); }

            btn.disabled = false; btn.innerHTML = textoOriginal;
            document.getElementById(inputId).value = '';
            document.getElementById(inputId.replace('file-upload-', 'count-')).innerText = '';
        }

        document.getElementById('form-logo').addEventListener('submit', (e) => {
            e.preventDefault();
            injetarImagemDesign('file-upload-logo', 'btn-inj-logo', 'logoUrl', 'Enviando Logotipo para a loja...');
        });

        document.getElementById('form-hero').addEventListener('submit', (e) => {
            e.preventDefault();
            injetarImagemDesign('file-upload-hero', 'btn-inj-hero', 'heroImage', 'Enviando Imagem de Capa para a loja...');
        });

    </script>
</body>
</html>
